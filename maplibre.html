<!DOCTYPE html>
<html>
<head>
    <title>Buskatoon - Saskatoon Live Bus Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <script src="js/maplibre-gl-5.21.1.js"></script>
    <link href="js/maplibre-gl-5.21.1.css" rel="stylesheet" />
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #map {
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        const UNKNOWN_ROUTE = 'unknown';
        const UNKNOWN_ROUTE_COLOR = 'aaaaaa';
        const UNKNOWN_ROUTE_SHORT_NAME = '??';

        function easeInOutQuad(x) {
            return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2;
        }

        function formatBearing(bearing) {
            return ['↑ N', '↗ NE', '→ E', '↘ SE', '↓ S', '↙ SW', '← W', '↖ NW'][Math.round(bearing / 45)];
        }

        function formatSpeed(speed) {
            if (typeof speed === 'number') {
                return `(${Math.round(speed * 3.6)} km/h)`;
            } else {
                return '';
            }
        }

        function getAge(lastReport) {
            return Math.round(+(new Date())/1000 - lastReport);
        }

        function getTextColor(bgColor) {
            const r = parseInt(bgColor.substr(0, 2), 16);
            const g = parseInt(bgColor.substr(2, 2), 16);
            const b = parseInt(bgColor.substr(4, 2), 16);
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return luminance > 0.5 ? '000000' : 'ffffff';
        }

        // ./bus-marker.png
        const busMarkerBase64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACQAAAAwCAYAAAB5R9gVAAAABmJLR0QA/wD/AP+gvaeTAAAGi0lEQVRYhcWYbYxU1RnHf+fce+fe2Zld9gXSLYpsYkFigGhEQisNBdJa2CAQibyUrli22tWoJTYlIbGl/VSNHzWpy0s18SW4icpg0phI3FLTUCxUV2yWShXK7JvCMruzM3Nn7tx7+mF2x92dmZ07u4v9f7m55/6f5/zPOfd5nnOOoCIc1CH6IIgHQCwFVQ/CBAUIB0gAV4DPgDOg3odD/yBH8AXhj9ayGMzDIL8LSq9sEHwB6iXwnocjgzMUtMGEBW8D95bnlsUQ8CzMfxYOZqchaO+doJ0E6mYoZDL+Du5uOHKxAkFtq8D9CxCYZTFjuA7eRjh8evIHWch9ZD24p26gGIA6kO/Cz783+cOkGdq7ELSPgNobKGY8BsBbAYejYw3jZuhxE7S3v0ExAN8CrSOXTgoEZX4J3PENihmFWgW9j4y9jS7ZQ/PA+AyYU8rMsgyCQWNaXSaTGdLpkpEO8BWwCNqHRqfKeHIqMbt2reTllx9C14vEgA9kMll27DjMW2/9sxRlHtAG/GFs7XZM5XDTpuUFYlpa/sQ773QV5W/bdhft7bvz74GAzqZNy6cSBLBrVFDrKuDWqZhCFKar/fvvpaVlVVH+TTcVxkURF5OxDH6xVAe5sSwViEav093d74dKT0+Mnp5Y/v3227/tyw5Usw6s8EONRD7mscde9+l4Io4efdDPDAHeCgnitmn1ckMgFknw5v+/ZeQh1EIJ4kbWrAohghLUTPc5swilSSH9bS+3b7+bp576IdXVlm/3dXVVHDiwga1b/VUkIRW6kFmhvPIloaEhxHPPbePpp5vp6DhLJPIxH354if7+4Qm8m2+uY+XKJjZvvoP777+TUMj0PQAhXXRpOHhZ/zVqzpwgra2raW1dDcDwsM3gYAIhoKEhTDjsX8BkSCOrpDScjF8D1/X45JMeslkv31ZTY9HU1MDChQ0TxDiOy/nzvXie7wMHMpBOSs2yr/o1eOKJYyxf/nva2l4ty92z5yWWLfsd+/e/6c+5UOgB+yuJpFuzUr5shoZSE56zxQXQgzZI/qWDOmeEkutdO1jWqL19Nzt33s2aNYvLcl97rZUPPrjIunX+CoFeNQKIs1IJcUIaDppplyQPDiYAqKoK0Ny8zNePW1NjsXHjUiwrFzDXriVKiwmmkLqL0EREwEFZ1XjukpfVFthX5xU1mDs3zKOP/oC9e+/hllvqAXjxxVPEYsWXo6mpge3bczW7qyvKG2+c5YUXOonFkoVkoQjOvQqaeyHVH1kiAEKN9/1awTPOSBhnJFxyJO+9t4/165eMdnqAy5evFeWtW7eEkyf3AXDo0F95+OFXSvo0quMYoQQI2pJ9kT8KgNqmLbUZ2/scRJ19rR7PKZ6XgkEDyzLwPDXlzyqEoLY2909OtZ+WRgarYRCgPynVrfSeSGoAdqzbDoQXu8CPZMAhmwpS7FCbzXrYtlNuww6AbTvYtoPresUJQmHVxxDSAyF+5fRFTsO4Y1DCij+v4ILUsxjhkbIdzhSB6jhCywJ0JfuGjoy1f71zv9Rpo9QewDVCCTSrdNTNFHowhV6VBMgi5M+gMz/l2nhiNvHvqB6+LSTgHt1M46YtlDe9o08pSMPBrI3l/gjBb5N9x49N+D7ZIBV2fgPiPEJh1l3PrfEsQUgPs/Y6CAVwLtnX+EyB4AKri39OC0/9BEgIzf16NDNWMzpAzQMY0iS7oN0pLwhIfBnpUkL8FFAykMmNyv81YVGYtTGk4QB4KLU73hu5UIynFWsEyI5c6DaqlwSA7+fSuoeb9r9bnCxGs9IACCUOJAciR0txSwoCcEZ2dhrhvruAxdLIglB4mco2YIGaYfRgLokK1LHEQGTfVPwyIXTQS+rmAyj+BmCEE         const busMarkerWidth = 36;
        const busMarkerHeight = 48;

        function generateBusIcon(routeNumber, routeColor) {
          const labelWidth = 40;
          const labelHeight = 28;
          const gap = -3;
          const totalWidth = Math.max(busMarkerWidth, labelWidth);
          const totalHeight = labelHeight + gap + busMarkerHeight;

          const busMarkerX = (totalWidth - busMarkerWidth) / 2;
          const busMarkerY = labelHeight + gap;

          const svgString = `
            <svg width="${totalWidth}" height="${totalHeight}" viewBox="0 0 ${totalWidth} ${totalHeight}" xmlns="http://www.w3.org/2000/svg">
                <image href="${busMarkerBase64}" x="${busMarkerX}" y="${busMarkerY}" width="${busMarkerWidth}" height="${busMarkerHeight}" image-rendering="pixelated" />
                <rect x="1" y="1" width="${labelWidth - 2}" height="${labelHeight - 2}" rx="6" fill="#${routeColor}" stroke="#000C36" stroke-width="2" />
                <text x="${labelWidth / 2}" y="${labelHeight / 2}" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="#${getTextColor(routeColor)}" text-anchor="middle" dominant-baseline="central">
                    ${routeNumber}
                </text>
            </svg>
          `;

          return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svgString)}`;
        }

        function getBusIconId(bus) {
            const routeNumber = bus.properties.route?.short_name;
            const routeColor = bus.properties.route?.color ?? UNKNOWN_ROUTE_COLOR;
            return `bus-icon-${routeNumber ?? UNKNOWN_ROUTE}-${routeColor}`;
        }

        const params = new URLSearchParams(window.location.search);
        const fakeRoutesEnabled = !!params.get('fake_routes');

        const busFeaturesById = {};
        const busPositions = {
            type: 'FeatureCollection',
            features: []
        };

        const busHistoriesById = {};
        const busHistories = {
            type: 'FeatureCollection',
            features: []
        };

        const busRoute = {
            type: 'FeatureCollection',
            features: []
        };

        const saskatoonCenter = [-106.650046, 52.133214];
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/bright',
            center: saskatoonCenter,
            zoom: 11,
            maxBounds: [
                [saskatoonCenter[0] - 0.7, saskatoonCenter[1] - 0.3],
                [saskatoonCenter[0] + 0.7, saskatoonCenter[1] + 0.3],
            ],
            hash: true
        });

        map.addControl(
          new maplibregl.NavigationControl(),
          'top-left'
        );

        map.addControl(
            new maplibregl.GeolocateControl({
                positionOptions: {
                    enableHighAccuracy: true
                },
                trackUserLocation: true
            }),
            'top-left'
        );

        map.on('load', async function() {
            let popup, popupBusId;

            const existingImages = {};
            map.on('styleimagemissing', async (e) => {
                if (existingImages[e.id]) {
                    return;
                }
                existingImages[e.id] = true;

                const match = e.id.match(/bus-icon-(?<number>.+?)-(?<color>.+)/);
                if (match) {
                    let { number, color } = match.groups;
                    if (number === UNKNOWN_ROUTE) {
                        number = UNKNOWN_ROUTE_SHORT_NAME;
                    }

                    const svg = generateBusIcon(number, color);
                    const image = new Image();
                    const promise = new Promise((resolve) => {
                        image.onload = resolve;
                    });
                    image.src = svg;
                    await promise; // Wait for the image to load
                    map.addImage(e.id, image, { pixelRatio: 2 });
                }
            });

            map.addSource('busRoute', {
                type: 'geojson',
                data: busRoute
            });

            map.addLayer({
                id: 'busRoute',
                type: 'line',
                source: 'busRoute',
                layout: {
                    'line-cap': 'round',
                    'line-join': 'round'
                },
                paint: {
                    'line-color': ['get', 'color'],
                    'line-width': 3,
                    'line-opacity': 0.75
                }
            });

            map.addSource('busHistories', {
                type: 'geojson',
                data: busHistories
            });

            map.addLayer({
                id: 'busHistories',
                type: 'line',
                source: 'busHistories',
                layout: {
                    'line-cap': 'round',
                    'line-join': 'round'
                },
                paint: {
                    'line-color': ['get', 'color'],
                    'line-width': 3,
                    'line-opacity': 0.75,
                    'line-dasharray': [1, 2]
                }
            });

            map.addSource('buses', {
                type: 'geojson',
                data: busPositions
            });

            map.addLayer({
                id: 'buses',
                type: 'symbol',
                source: 'buses',
                layout: {
                    'icon-overlap': 'always',
                    'icon-allow-overlap': true,
                    'icon-image': ['get', 'icon'],
                    'icon-anchor': 'bottom',
                }
            });

            function updatePopupContent() {
                if (popup && popupBusId && busFeaturesById[popupBusId]) {
                    const bus = busFeaturesById[popupBusId];

                    let content = `<strong>Bus ID:</strong> ${bus.properties.id}<br>`;
                    content += `<strong>Bearing:</strong> ${formatBearing(bus.properties.bearing)} ${formatSpeed(bus.properties.speed)}<br>`;
                    content += `<strong>Last report:</strong> ${getAge(bus.properties.timestamp)} seconds ago`;

                    popup.setHTML(content);
                }
            }
            setInterval(updatePopupContent, 1000);

            const updatePositions = () => {
                //fetch('./vehicle_positions.json')
                fetch('https://buskatoon.ca/vehicle_positions.json')
                    .then(r => r.json())
                    .then(data => {
                        for (const vehicleId in data.vehicles) {
                            const vehicleHistory = data.vehicles[vehicleId];
                            const currentPos = vehicleHistory[0]; // Most recent position

                            if (busFeaturesById[vehicleId]) {
                                busFeaturesById[vehicleId].properties.bearing = currentPos.bearing;
                                busFeaturesById[vehicleId].properties.speed = currentPos.speed;
                                busFeaturesById[vehicleId].properties.timestamp = currentPos.timestamp;

                                busFeaturesById[vehicleId].properties.fromCoordinates = [
                                    busFeaturesById[vehicleId].geometry.coordinates[0],
                                    busFeaturesById[vehicleId].geometry.coordinates[1],
                                ];
                                busFeaturesById[vehicleId].properties.toCoordinates =
                                    [currentPos.longitude, currentPos.latitude];
                            } else {
                                const busFeature = {
                                    type: 'Feature',
                                    geometry: {
                                        type: 'Point',
                                        coordinates: [currentPos.longitude, currentPos.latitude]
                                    },
                                    properties: {
                                        id: vehicleId,
                                        bearing: currentPos.bearing,
                                        speed: currentPos.speed,
                                        timestamp: currentPos.timestamp,
                                        route: fakeRoutesEnabled ? {
                                            short_name: String(Math.floor(Math.random() * 24) + 1),
                                            color: (Math.random() * 0xFFFFFF << 0).toString(16).padStart(6, '0'),
                                            shape_id: 96589
                                        } : currentPos.route
                                    }
                                };
                                busFeature.properties.icon = getBusIconId(busFeature);
                                busPositions.features.push(busFeature);
                                busFeaturesById[vehicleId] = busFeature;
                            }

                            if (busHistoriesById[vehicleId]) {
                                busHistoriesById[vehicleId].geometry.coordinates =
                                    vehicleHistory.map(pos => [pos.longitude, pos.latitude]);

                                // Endpoint will be animated along with the bus marker
                                busHistoriesById[vehicleId].geometry.coordinates[0] =
                                    busFeaturesById[vehicleId].geometry.coordinates;
                            } else {
                                const busHistory = {
                                    type: 'Feature',
                                    geometry: {
                                        type: 'LineString',
                                        coordinates: vehicleHistory.map(pos => [pos.longitude, pos.latitude])
                                    },
                                    properties: {
                                        id: vehicleId,
                                        color: '#' + (busFeaturesById[vehicleId].properties.route?.color ?? UNKNOWN_ROUTE_COLOR)
                                    }
                                };
                                busHistories.features.push(busHistory);
                                busHistoriesById[vehicleId] = busHistory;
                            }
                        }

                        map.getSource('buses').setData(busPositions);
                        map.getSource('busHistories').setData(busHistories);
                        updatePopupContent();

                        let start;
                        const animateBusMovements = (timestamp) => {
                            if (start === undefined) {
                                start = timestamp;
                            }
                            const elapsed = timestamp - start;
                            const interp = elapsed / 1000; // 1 second animation
                            const lastFrame = interp >= 1;
                            const easedInterp = easeInOutQuad(interp);

                            Object.values(busFeaturesById).forEach(busFeature => {
                                if (busFeature.properties.toCoordinates) {
                                    if (lastFrame) {
                                        busFeature.geometry.coordinates = busFeature.properties.toCoordinates;
                                        delete busFeature.properties.fromCoordinates;
                                        delete busFeature.properties.toCoordinates;
                                    } else {
                                        busFeature.geometry.coordinates = [
                                            busFeature.properties.fromCoordinates[0] + easedInterp * (
                                                busFeature.properties.toCoordinates[0] - busFeature.properties.fromCoordinates[0]
                                            ),
                                            busFeature.properties.fromCoordinates[1] + easedInterp * (
                                                busFeature.properties.toCoordinates[1] - busFeature.properties.fromCoordinates[1]
                                            ),
                                        ];
                                    }

                                    if (busHistoriesById[busFeature.properties.id]) {
                                        busHistoriesById[busFeature.properties.id].geometry.coordinates[0] =
                                            busFeature.geometry.coordinates;
                                    }

                                    if (popup && busFeature.properties.id === popupBusId) {
                                        popup.setLngLat(busFeature.geometry.coordinates);
                                    }
                                }
                            });

                            map.getSource('buses').setData(busPositions);
                            map.getSource('busHistories').setData(busHistories);

                            if (!lastFrame) {
                                requestAnimationFrame(animateBusMovements);
                            }
                        };
                        requestAnimationFrame(animateBusMovements);
                    });
            };
            updatePositions();
            setInterval(updatePositions, 10000);

            let transitShapes = {};
            fetch('shapes.json')
                .then(r => r.json())
                .then(data => {
                    transitShapes = data;
                });

            function selectBus(busId) {
                const bus = busFeaturesById[busId];

                popup = new maplibregl.Popup({ anchor: 'bottom', offset: 35 })
                    .setLngLat(bus.geometry.coordinates.slice())
                    .addTo(map);
                popupBusId = busId;
                updatePopupContent();

                if (bus.properties.route?.shape_id && transitShapes[bus.properties.route?.shape_id]) {
                    busRoute.features = [{
                        type: 'Feature',
                        geometry: {
                            type: 'LineString',
                            coordinates: transitShapes[bus.properties.route.shape_id]
                        },
                        properties: {
                            id: busId,
                            color: '#' + (bus.properties.route?.color ?? UNKNOWN_ROUTE_COLOR)
                        }
                    }];

                    map.getSource('busRoute').setData(busRoute);

                    popup.on('close', () => {
                        if (busRoute.features.length > 0 && busRoute.features[0].properties.id === busId) {
                            busRoute.features = [];
                            map.getSource('busRoute').setData(busRoute);
                        }
                    });
                }
            }

            map.on('mouseenter', 'buses', () => { map.getCanvas().style.cursor = 'pointer'; });
            map.on('mouseleave', 'buses', () => { map.getCanvas().style.cursor = ''; });
            map.on('click', 'buses', (e) => {
                selectBus(e.features[0].properties.id);
                e.preventDefault();
            });

            map.on('mouseenter', 'busHistories', () => { map.getCanvas().style.cursor = 'pointer'; });
            map.on('mouseleave', 'busHistories', () => { map.getCanvas().style.cursor = ''; });
            map.on('click', 'busHistories', (e) => {
                selectBus(e.features[0].properties.id);
                e.preventDefault();
            });
        });
    </script>
</body>
</html>
